name: Windows Installer Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'core/**'
      - 'platform/windows/**'
      - 'platform/mac/MyBookshelf.icns'
      - 'platform/mac/MyBookshelf.iconset/**'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-installer:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: cmd

      - name: Build installer
        working-directory: platform/windows
        run: iscc "MyBookshelf.iss"
        shell: cmd

      - name: Get version
        id: ver
        run: |
          $v = (Select-String '#define MyAppVersion\s+"(.+)"' platform/windows/MyBookshelf.iss).Matches[0].Groups[1].Value
          echo "version=$v" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyBookshelf-Setup-v${{ steps.ver.outputs.version }}
          path: dist/windows/Setup.exe
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/windows/Setup.exe
          generate_release_notes: true
